                **Qt Event 与 信号槽机制的异同**

1. 它们是实现同一种功能的两种方式
2. Event 像是一条流水线, 所有的 Event (系统的, 非系统的) 都会往里面放, 你自己重载 Handle 方法截取.
3. SignalSlot 是借用 moc 机制以及回调的方式实现，它需要定向链接，类似快递员为你送快递。
4. Event 通常需要继承与重写, SignalSlot 则无需深入对象内部，可以通过外部链接。
