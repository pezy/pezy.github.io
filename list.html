<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="Some links that I have collected."/>
    <link rel="stylesheet" href="css/typo.css"/>
    <link rel="shortcut icon" href="res/favicon.png">
    <title>Links List — pezy</title>
    <style>
        code{ color:#0066bb; }
        a { color: #0066bb; }
        html{ background:#fff; }
        body { min-width: 200px; max-width: 790px; margin: 0 auto; padding: 30px; }
        pre{white-space:pre-wrap;}
        .question-summary {
            padding: 12px 0 10px 0;
            border-bottom: 1px solid #e0e0e0;
            overflow: hidden;
            float: left;
        }
        .question-summary .views {
            display: inline-block;
            height: 38px;
            min-width: 40px;
            margin: 0 7px 0 0;
            font-size: 11px;
            color: #777;
            padding: 5px 5px 6px 5px;
            text-align: center;
        }
        .question-summary .mini-counts {
            font-size: 17px;
            font-weight: 300;
            color: #777;
            margin-bottom: 4px;
        }
        .question-summary .cp {
            vertical-align: top;
            float: left;
            margin-right: 10px;
            cursor: pointer;
        }
        .question-summary .summary {
            width: 530px;
            padding: 0;
            float: left;
        }
        .question-summary .summary h3 {
            color: #30a7fc;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.3;
            margin-bottom: 1.2em;
            cursor: pointer;
        }
        .tags {
            line-height: 18px;
            float: left;
            color: #3e6d8e;
            font-size: 12px;
            white-space: nowrap;
            background: #e4edf4;
            border: 1px solid #e4edf4;
            display: inline-block;
            margin: 2px 2px 2px 0;
            border-radius: 0
        }
        .question-summary .started {
            font-weight: normal;
            margin-left: 1px;
            color: #999;
            font-size: 12px;
            margin-right: 2px;
            line-height: inherit;
            padding-top: 4px;
            white-space: nowrap;
            float: right;
        }

        i.serif{ text-transform:lowercase; color:#0066bb; }
        :-moz-any(h1, h2, h3, h4, h5, h5) i.serif{ text-transform: capitalize; }
        i.serif:hover{ color:inherit; }

        #wrapper{ padding:5% 10%; position:relative;}
    </style>
</head>
<body>
<div id="wrapper" class="typo typo-selection">
    <h2><i class="serif">pezy</i> 的清单</h2>
</div>
<div class="question-summary">
    <div class="cp">
        <div class="views">
            <div class="mini-counts">
                <span title="1 votes">1</span>
            </div>
            <div>views</div>
        </div>
    </div>
    <div class="summary">
        <h3> <a href="http://getskeleton.com/"> Skeleton_ Responsive CSS Boilerplate </a></h3>
        <div class="tags">css</div>
        <div class="started">A dead simple, responsive boilerplate</div>
    </div>
</div>
<div class="question-summary">
    <div class="cp">
        <div class="views">
            <div class="mini-counts">
                <span title="0 votes">0</span>
            </div>
            <div>views</div>
        </div>
    </div>
    <div class="summary">
        <h3> <a href="https://www.scullinsteel.com/apple2/"> An Apple II Emulator in JavaScript </a></h3>
        <div class="tags">JavaScript</div>
        <div class="started">超级有意思，里面好多很古老的游戏</div>
    </div>
</div>

</body>
</html>
