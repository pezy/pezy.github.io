<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="description" content="pezy's homepage.">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimal-ui">
    <meta name="keywords" content="pezy, C++, blog">
    <link rel="shortcut icon" href="res/favicon.png">
    <link rel="stylesheet" href="css/typo.css"/>
    <title>pezy's homepage</title>
    <style>
        code{ color: #304f4e; }
        a { color: #304f4e; border-bottom: 1px solid #0066bb !important; }
        body { min-width: 200px; max-width: 790px; margin: 0 auto; padding: 30px; }
        pre{white-space:pre-wrap;}
        .un_styled { list-style-type: none !important; }
        .nav { padding-left: 0; margin-bottom: 0; list-style: none; border-bottom: 3px double #eee; }
        .nav li { display: inline-block; margin-left: 5px; margin-right: 5px; }
        li time { color: #666; font-family: monospace; font-size: 14px; }
        .header img { float: right; width: 72px; height: 72px; border-radius: 48px; }
        .header h1 { position: relative; top: 10px; }

        .button { display: inline-block; height: 38px; padding: 0 25px; color: #555; text-align: center; font-size: 15px;
            line-height: 38px; letter-spacing: .1rem; text-transform: uppercase; text-decoration: none;
            white-space: nowrap; background-color: transparent; border-radius: 4px; border: 1px solid #bbb !important;
            cursor: pointer; box-sizing: border-box; }
        .button:hover, .button:focus { color: #333; border-color: #888; outline: 0; }

        i.serif{ text-transform:lowercase; color:#0066bb; }
        :-moz-any(h1, h2, h3, h4, h5, h5) i.serif{ text-transform: capitalize; }
        i.serif:hover{ color:inherit; }

        #wrapper{ padding:5% 10%; position:relative;}
        #tag_line{ color:#999; font-size:1em; margin:-2em 0 2em; padding-bottom:2em; border-bottom:3px double #eee; }
        #links{ position:relative; }

        @media only screen and (max-width: 640px) {
            table{ word-break:break-all;word-wrap:break-word;font-size:12px; }
            .typo table th, .typo table td, .typo-table th, .typo-table td .typo table caption {
                padding: 0.5em;
            }
            .header img{ display:none; }
            .header h1{ top: 0; }
            #links{ display:none; }
        }
    </style>
</head>
<body>
<div id="wrapper" class="typo typo-selection">
    <div class="header">
        <img src="res/me.png" alt="pezy">
        <h1><i class="serif">pezy</i> 就爱瞎折腾</h1><br/>

    </div>
    <div id="links" class="nav">
        <ul>

            </li>
            <li>
                <a class="button" href="/diary">日常</a>
            </li>
            <li>
                <a class="button" href="reading.html">书单</a>

            <li>
                <a class="button" href="list.html">清单</a>
            </li>
            <li>
                <a class="button" href="/love">纪念</a>
            </li>
        </ul>
    </div>
    <h2><i class="serif">C++</i> 最新笔记</h2>
    <ul class="un_styled">
        <li>
            <time>2015-05-25</time>
             —
            <a href="cpp/cpp-exception.html">关于 <i class="serif">C++</i> 的异常</a>
        </li>
    </ul>
    <h2>胡扯前端</h2>
    <ul class="un_styled">
        <li>
            <time>2015-05-28</time>
            —
            <a href="front-end/dynamic-content-on-the-static-page.html">浅谈如何让 <i class="serif">Github Pages</i> 上的静态页面动起来</a>
        </li>
    </ul>

</div>
</body>
</html>
